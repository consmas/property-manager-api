# /etc/nginx/sites-available/propertyapi.consmas.com
server {
    listen 80;
    listen [::]:80;
    server_name propertyapi.consmas.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name propertyapi.consmas.com;

    # Replace with certbot-managed paths
    ssl_certificate /etc/letsencrypt/live/propertyapi.consmas.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/propertyapi.consmas.com/privkey.pem;

    client_max_body_size 20m;
    proxy_connect_timeout 60s;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    access_log /var/log/nginx/propertyapi_access.log;
    error_log /var/log/nginx/propertyapi_error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
